<!DOCTYPE html>
<html>
<head>
<title>Ultra Music Player</title>

<style>
body {
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #00ffcc;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#results {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.video {
    margin: 10px;
    cursor: pointer;
}

.video img {
    width: 200px;
    border-radius: 10px;
}

#player iframe {
    margin-top: 20px;
    width: 80%;
    height: 350px;
    border-radius: 15px;
}

#songText {
    margin-top: 15px;
    font-size: 22px;
    color: #00ffcc;
}
</style>
</head>

<body>

<h1>🎧 Ultra Music Player</h1>

<input type="text" id="search" placeholder="Search any song...">
<button onclick="searchSong()">Search</button>

<div id="results"></div>
<div id="player"></div>
<div id="songText"></div>

<script>
const API_KEY = "AIzaSyCUoKdsA8VbuCo6Fmi0eH1iFmSXBzfib1I";

async function searchSong() {
    let query = document.getElementById("search").value;

    let res = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&videoEmbeddable=true&key=${API_KEY}&maxResults=8`
    );

    let data = await res.json();

    let results = document.getElementById("results");
    results.innerHTML = "";

    data.items.forEach(item => {
        let videoId = item.id.videoId;
        let title = item.snippet.title;
        let thumb = item.snippet.thumbnails.medium.url;

        let div = document.createElement("div");
        div.className = "video";
        div.innerHTML = `
            <img src="${thumb}">
            <p>${title}</p>
        `;

        div.onclick = () => playVideo(videoId, title);

        results.appendChild(div);
    });
}

function playVideo(id, title) {
    let player = document.getElementById("player");

    player.innerHTML = `
        <iframe 
        width="100%" 
        height="350"
        src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
        </iframe>
    `;

    // Unmute after 1 sec (browser autoplay rule bypass)
    setTimeout(() => {
        player.innerHTML = `
            <iframe 
            width="100%" 
            height="350"
            src="https://www.youtube.com/embed/${id}?autoplay=1"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
            </iframe>
        `;
    }, 1000);

    animateText(title);
}

function animateText(text) {
    let el = document.getElementById("songText");
    el.innerHTML = "";
    let i = 0;

    let interval = setInterval(() => {
        el.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 50);
}
</script>

</body>
</html>
