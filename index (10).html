<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ff88;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 1000px;
        }

        .dashboard {
            backdrop-filter: blur(10px);
            background: rgba(20, 20, 40, 0.4);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.1),
                        inset 0 0 20px rgba(0, 255, 136, 0.05);
        }

        .clock {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 3px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88,
                         0 0 20px #00ff88,
                         0 0 30px rgba(0, 255, 136, 0.5);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 10px #00ff88,
                             0 0 20px #00ff88,
                             0 0 30px rgba(0, 255, 136, 0.5);
            }
            50% {
                text-shadow: 0 0 15px #00ff88,
                             0 0 30px #00ff88,
                             0 0 45px rgba(0, 255, 136, 0.8);
            }
        }

        .search-container {
            position: relative;
            margin-bottom: 30px;
        }

        .search-bar {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 255, 136, 0.05);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            color: #00ff88;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.1);
        }

        .search-bar:focus {
            outline: none;
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.2),
                        0 0 20px rgba(0, 255, 136, 0.3);
        }

        .search-bar::placeholder {
            color: rgba(0, 255, 136, 0.5);
        }

        .status {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            backdrop-filter: blur(10px);
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .card-label {
            font-size: 0.9rem;
            color: rgba(0, 255, 136, 0.7);
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 1.8rem;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        @media (max-width: 768px) {
            .clock {
                font-size: 2.5rem;
            }
            
            .status {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard">
            <div class="clock" id="clock">00:00:00</div>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="$ search_database...">
            </div>
            <div class="status">
                <div class="card">
                    <div class="card-label">SYSTEM STATUS</div>
                    <div class="card-value">ONLINE</div>
                </div>
                <div class="card">
                    <div class="card-label">NETWORK SPEED</div>
                    <div class="card-value">9.8 Gbps</div>
                </div>
                <div class="card">
                    <div class="card-label">SECURITY LEVEL</div>
                    <div class="card-value">MAX</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const clock = document.getElementById('clock');
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clock.textContent = `${hours}:${minutes}:${seconds}`;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
